name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g., 1.5.0) — defaults to package.json version on push'
        required: false
        type: string
      version_code:
        description: 'Version code (incrementing integer) — defaults to run_number on push'
        required: false
        type: number
      force_update:
        description: 'Force update (mandatory)'
        required: false
        default: false
        type: boolean
      release_notes:
        description: 'Release notes (comma-separated or multi-line)'
        required: false
        default: 'Bug fixes and improvements'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version info
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=$(jq -r '.version' package.json)
            # Use run_number as version_code so it increments on every push
            VERSION_CODE=${{ github.run_number }}
            FORCE_UPDATE=false
            NOTES="$(git log -1 --pretty=%s)"
          else
            VERSION="${{ inputs.version }}"
            [ -z "$VERSION" ] && VERSION=$(jq -r '.version' package.json)
            VERSION_CODE=${{ inputs.version_code }}
            [ -z "$VERSION_CODE" ] && VERSION_CODE=${{ github.run_number }}
            FORCE_UPDATE=${{ inputs.force_update == true && 'true' || 'false' }}
            NOTES="${{ inputs.release_notes }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "force_update=$FORCE_UPDATE" >> $GITHUB_OUTPUT
          echo "release_notes=$NOTES" >> $GITHUB_OUTPUT
          echo "apk_filename=highlands-pos-$VERSION.apk" >> $GITHUB_OUTPUT
          echo "APK will be: highlands-pos-$VERSION.apk"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
          VITE_APP_VERSION_CODE: ${{ steps.version.outputs.version_code }}

      - name: Add & Sync Capacitor Android
        run: |
          if [ ! -d android ]; then npx cap add android; fi
          npx cap sync android

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Decoding keystore from secret"
            mkdir -p android/app
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/highlands-release.keystore
            echo "Keystore decoded successfully"
            ls -la android/app/highlands-release.keystore
          else
            echo "ANDROID_KEYSTORE_BASE64 secret is empty - keystore will be missing!"
            exit 1
          fi

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          APK=$(find android -name "*.apk" -path "*/release/*" | head -1)
          echo "Found APK: $APK"
          cp "$APK" ${{ steps.version.outputs.apk_filename }}

      - name: Upload APK to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 103.233.58.46
          username: highlandscafe
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ${{ steps.version.outputs.apk_filename }}
          target: /tmp/pos-apk

      - name: Move APK to downloads directory & publish version
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 103.233.58.46
          username: highlandscafe
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /var/www/highlands-motel/current/downloads
            mv /tmp/pos-apk/${{ steps.version.outputs.apk_filename }} /var/www/highlands-motel/current/downloads/${{ steps.version.outputs.apk_filename }}
            rm -rf /tmp/pos-apk

      - name: Publish version metadata
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 103.233.58.46
          username: highlandscafe
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ -z "${{ secrets.INSFORGE_SERVICE_KEY }}" ]; then
              echo "INSFORGE_SERVICE_KEY is empty, skipping publish"
              exit 0
            fi

            curl -X POST "https://8cvkfu8m.us-east.insforge.app/api/query" \
              -H "Content-Type: application/json" \
              -H "apikey: ${{ secrets.INSFORGE_SERVICE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.INSFORGE_SERVICE_KEY }}" \
              -d '{"query": "UPDATE app_versions SET is_current = false WHERE is_current = true;"}'

            curl -X POST "https://8cvkfu8m.us-east.insforge.app/api/query" \
              -H "Content-Type: application/json" \
              -H "apikey: ${{ secrets.INSFORGE_SERVICE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.INSFORGE_SERVICE_KEY }}" \
              -d "$(jq -nc \
                --arg version '${{ steps.version.outputs.version }}' \
                --argjson version_code ${{ steps.version.outputs.version_code }} \
                --arg min_version '1.0.0' \
                --argjson min_version_code 1 \
                --argjson force ${{ steps.version.outputs.force_update }} \
                --arg url 'https://pos.highlandscafemotelinn.com/downloads/${{ steps.version.outputs.apk_filename }}' \
                --arg notes '${{ steps.version.outputs.release_notes }}' \
                '{query: "INSERT INTO app_versions (version, version_code, min_version, min_version_code, force_update, apk_url, release_notes, is_current) VALUES (\($version | @sh), \($version_code), \($min_version | @sh), \($min_version_code), \($force), \($url | @sh), \($notes | @sh), true)"}')"

