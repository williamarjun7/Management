# Add this inside the pos.highlandscafemotelinn.com server block
# in highlands-motel-nginx.conf, inside the server block:

    # APK downloads for OTA updates
    location /downloads/ {
        alias /var/www/highlands-motel/current/downloads/;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="$1"';
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
