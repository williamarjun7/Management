server {
    server_name highlandscafemotelinn.com www.highlandscafemotelinn.com _;

    root /var/www/highlands-motel/current;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/highlands-access.log;
    error_log /var/log/nginx/highlands-error.log warn;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/highlandscafemotelinn.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/highlandscafemotelinn.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.highlandscafemotelinn.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = highlandscafemotelinn.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name highlandscafemotelinn.com www.highlandscafemotelinn.com _;
    return 404; # managed by Certbot




}
