server {
    server_name highlandscafemotelinn.com www.highlandscafemotelinn.com;

    root /var/www/highlands-website/current;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/highlands-access.log;
    error_log /var/log/nginx/highlands-error.log warn;

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/highlandscafemotelinn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/highlandscafemotelinn.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    server_name pos.highlandscafemotelinn.com;

    root /var/www/highlands-motel/current;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/pos-access.log;
    error_log /var/log/nginx/pos-error.log warn;

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/highlandscafemotelinn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/highlandscafemotelinn.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
