server {
    if ($host = pos.highlandscafemotelinn.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = www.highlandscafemotelinn.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = highlandscafemotelinn.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    listen [::]:80;
    server_name highlandscafemotelinn.com www.highlandscafemotelinn.com pos.highlandscafemotelinn.com;
    return 301 https://$host$request_uri;
}
