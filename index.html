<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Highlands Cafe &amp; Motel Inn</title>
    <style>
      .boot-error { display:none; align-items:center; justify-content:center; min-height:100vh; padding:2rem; text-align:center; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
      .boot-error.visible { display:flex; }
      .boot-error h2 { font-size:1.25rem; font-weight:600; margin-bottom:0.5rem; }
      .boot-error p { color:#666; margin-bottom:1.5rem; font-size:0.875rem; }
      .boot-error button { padding:0.5rem 1.5rem; border-radius:0.5rem; border:1px solid #ddd; background:#fff; cursor:pointer; font-size:0.875rem; }
      .boot-error button:hover { background:#f5f5f5; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-error" class="boot-error">
      <div>
        <h2>Failed to load application</h2>
        <p id="boot-error-message">An unexpected error occurred during startup.</p>
        <button onclick="location.reload()">Retry</button>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('error', function (e) {
        if (e.target === window || e.target instanceof HTMLScriptElement || e.target instanceof HTMLImageElement) {
          var el = document.getElementById('boot-error');
          var msg = document.getElementById('boot-error-message');
          if (el) el.classList.add('visible');
          if (msg) msg.textContent = (e.error && e.error.message) || e.message || 'Failed to load application resources';
          return true;
        }
      });
      window.addEventListener('unhandledrejection', function (e) {
        var el = document.getElementById('boot-error');
        var msg = document.getElementById('boot-error-message');
        if (el) el.classList.add('visible');
        if (msg) msg.textContent = (e.reason && e.reason.message) || 'An unexpected error occurred';
      });
    </script>
  </body>
</html>
